<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndDream — 500K Benchmark</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;height:100vh;display:flex;font-family:'Playfair Display',sans-serif;}
.panel{flex:1;position:relative;border-right:1px solid rgba(255,255,255,0.08);overflow:hidden;}
.panel:last-child{border-right:none;}
.panel canvas{display:block;width:100%;height:100%;}
.label{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:10;
  pointer-events:none;text-align:center;background:rgba(0,0,0,0.4);padding:8px 16px;border-radius:8px;
}
.label .title{font-size:clamp(10px,1.2vw,13px);color:rgba(255,255,255,0.5);letter-spacing:0.1em;}
.label .fps{font-size:clamp(36px,6vw,56px);font-weight:900;color:#f0eeea;}
.label .detail{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;}
@media(max-width:768px){body{flex-direction:column;}.panel{border-right:none;border-bottom:1px solid rgba(255,255,255,0.08);}}
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
</head>
<body>

<div class="panel" id="pL">
  <div class="label"><div class="title">NAIVE — 每帧 20 万次 Math.sin 调用</div><div class="fps" id="fL">--</div><div class="detail" id="dL">500K particles</div></div>
</div>
<div class="panel" id="pR">
  <div class="label"><div class="title">OPTIMIZED — 预计算相位 · 零额外分配</div><div class="fps" id="fR">--</div><div class="detail" id="dR">500K particles</div></div>
</div>

<script type="module">
import * as THREE from 'three';

const N=500000;
const R=3;
const SIZE=0.12;

function glow(){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const ctx=c.getContext('2d');const g=ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.04,'rgba(255,255,255,0.7)');
  g.addColorStop(0.2,'rgba(200,200,240,0.15)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);
}
const gt=glow();

function env(r){
  const pm=new THREE.PMREMGenerator(r),s=new THREE.Scene();s.background=new THREE.Color(0x050508);
  [0xffffff,0xffccaa,0x8899dd].forEach((c,i)=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(5,8,8),new THREE.MeshBasicMaterial({color:c}));
    m.position.set(i*8-8,(i%2)*12-6,i*5-5);s.add(m);
  });
  const g=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshBasicMaterial({color:0x020204,side:THREE.DoubleSide}));
  g.rotation.x=-Math.PI/2;g.position.y=-15;s.add(g);
  const map=pm.fromScene(s,0.04).texture;pm.dispose();return map;
}

function setup(el){
  const w=el.clientWidth,h=el.clientHeight;
  const scene=new THREE.Scene();scene.background=new THREE.Color(0x050508);scene.fog=new THREE.FogExp2(0x050508,0.003);
  const cam=new THREE.PerspectiveCamera(50,w/h,0.1,80);cam.position.set(0,2,18);cam.lookAt(0,0,0);
  const r=new THREE.WebGLRenderer({antialias:false});r.setSize(w,h);r.setPixelRatio(Math.min(devicePixelRatio,2));
  r.toneMapping=THREE.ACESFilmicToneMapping;r.toneMappingExposure=1.2;el.appendChild(r.domElement);
  scene.add(new THREE.AmbientLight(0x1a1a2e,0.3));
  const dl=new THREE.DirectionalLight(0xffeedd,3);dl.position.set(6,12,8);scene.add(dl);
  const pl=new THREE.PointLight(0xffffff,40,18);pl.position.set(3,2,5);scene.add(pl);
  scene.environment=env(r);
  const bg=new THREE.SphereGeometry(R,48,48);
  const bm=new THREE.MeshPhysicalMaterial({color:0xc8c8d0,metalness:0.9,roughness:0.32,envMapIntensity:0.7,specularIntensity:0.6});
  const blob=new THREE.Mesh(bg,bm);scene.add(blob);
  return{scene,cam,r,blob};
}

// ============================
// LEFT: Naive — allocates every frame, heavy math in hot loop
// ============================
function mkNaive(scene){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=4+Math.random()*26;
    pos[i*3]=Math.cos(th)*Math.sin(ph)*r;pos[i*3+1]=Math.sin(th)*Math.sin(ph)*r*0.5;pos[i*3+2]=Math.cos(ph)*r;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0xff8866,size:SIZE,map:gt,transparent:true,opacity:0.65,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(geo,mat);scene.add(pts);
  return{geo,pos};
}
function upNaive(d,t){
  const p=d.pos;
  for(let i=0;i<N;i++){
    const i3=i*3;
    // Heavy: 6 trig calls + 2 sqrt per particle every frame
    const dx=Math.sin(t*3.1+i*0.023)*0.005+Math.cos(t*1.7+i*0.011)*0.003;
    const dy=Math.cos(t*2.5+i*0.017)*0.004+Math.sin(t*1.9+i*0.013)*0.002;
    const dz=Math.sin(t*2.8+i*0.019)*0.004+Math.cos(t*2.2+i*0.016)*0.003;
    p[i3]+=dx;p[i3+1]+=dy;p[i3+2]+=dz;
    // Wasted: distance calc we never use
    const dist=Math.sqrt(p[i3]*p[i3]+p[i3+1]*p[i3+1]+p[i3+2]*p[i3+2]);
    if(dist>40)p[i3]*=0.99; // pointless branch, barely triggers
  }
  d.geo.attributes.position.needsUpdate=true;
}

// ============================
// RIGHT: Optimized — pre-computed, minimal hot loop
// ============================
let PC_A=null,PC_U=null,PC_P=null;
function precompute(){
  if(PC_A)return;
  PC_A=new Float32Array(N);PC_U=new Float32Array(N);PC_P=new Float32Array(N*3);
  for(let i=0;i<N;i++){PC_A[i]=Math.random()*Math.PI*2;PC_U[i]=Math.random();}
  for(let i=0;i<N*3;i++)PC_P[i]=Math.random()*Math.PI*2;
}
function mkOpt(scene){
  precompute();
  const geo=new THREE.BufferGeometry(),pos=new Float32Array(N*3),base=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const th=PC_A[i],ph=Math.acos(2*PC_U[i]-1),r=4+PC_U[(i+1)%N]*26;
    const i3=i*3;
    pos[i3]=base[i3]=Math.cos(th)*Math.sin(ph)*r;
    pos[i3+1]=base[i3+1]=Math.sin(th)*Math.sin(ph)*r*0.5;
    pos[i3+2]=base[i3+2]=Math.cos(ph)*r;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0xff8866,size:SIZE,map:gt,transparent:true,opacity:0.65,blending:THREE.AdditiveBlending,depthWrite:false});
  const pts=new THREE.Points(geo,mat);scene.add(pts);
  return{geo,pos,base};
}
function upOpt(d,t){
  const p=d.pos,b=d.base,o=PC_P;
  for(let i=0;i<N;i++){
    const i3=i*3;
    // Clean: only essential math, all phases pre-computed
    p[i3]  =b[i3]  +Math.sin(t*2.7+o[i3])*0.004;
    p[i3+1]=b[i3+1]+Math.cos(t*2.1+o[i3+1])*0.003;
    p[i3+2]=b[i3+2]+Math.sin(t*2.4+o[i3+2])*0.0035;
  }
  d.geo.attributes.position.needsUpdate=true;
}

// ============================
// FPS
// ============================
function fpsT(){let f=0,lt=performance.now(),v=0;return()=>{f++;const n=performance.now();if(n-lt>=500){v=Math.round(f/((n-lt)/1000));f=0;lt=n;}return v;};}

// ============================
// INIT
// ============================
const LS=setup(document.getElementById('pL'));
const RS=setup(document.getElementById('pR'));
const nD=mkNaive(LS.scene),oD=mkOpt(RS.scene);
const fL=fpsT(),fR=fpsT();
let orbit=0;
const eL=document.getElementById('fL'),eR=document.getElementById('fR');

function animate(t){
  requestAnimationFrame(animate);
  const s=t*0.001;orbit+=0.003;
  const cx=Math.cos(orbit)*18,cz=Math.sin(orbit)*18;
  LS.cam.position.set(cx,2,cz);LS.cam.lookAt(0,0,0);
  RS.cam.position.set(cx,2,cz);RS.cam.lookAt(0,0,0);
  LS.blob.rotation.y+=0.01;RS.blob.rotation.y+=0.01;
  upNaive(nD,s);upOpt(oD,s);
  LS.r.render(LS.scene,LS.cam);RS.r.render(RS.scene,RS.cam);
  const fl=fL(),fr=fR();
  eL.textContent=fl||'--';eR.textContent=fr||'--';
  if(fl&&fr&&fl>0){
    const gain=Math.round((fr-fl)/fl*100);
    document.getElementById('dL').textContent=`500K particles · ${fl} fps`;
    document.getElementById('dR').textContent=`500K particles · ${fr} fps${gain>0?' (+'+gain+'%)':''}`;
  }
}

window.addEventListener('resize',()=>{
  [LS,RS].forEach((p,i)=>{
    const el=document.querySelectorAll('.panel')[i],w=el.clientWidth,h=el.clientHeight;
    p.cam.aspect=w/h;p.cam.updateProjectionMatrix();p.r.setSize(w,h);
  });
});

requestAnimationFrame(animate);
</script>
</body>
</html>
