<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Act X — And...</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;height:100vh;cursor:none}canvas{display:block}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:12px;color:rgba(0,0,0,0.3);letter-spacing:0.1em;transition:opacity 1s ease}
#logoText{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:opacity 3s ease}
#logoText .name{font-size:clamp(36px,8vw,80px);font-weight:900;letter-spacing:0.15em;color:#2a2218;text-shadow:0 0 60px rgba(255,220,180,0.5)}
#logoText .sub{font-size:clamp(14px,2vw,20px);color:#555;margin-top:12px;font-style:italic;letter-spacing:0.1em}
</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script></head><body>
<div id="logoText"><div class="name">ANDREAM</div><div class="sub">Continue.</div></div><div id="hint">scroll —</div>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const S=new THREE.Scene();S.background=new THREE.Color(0xffeedd);S.fog=new THREE.FogExp2(0xffeedd,0.0001);
const C=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,120);C.position.set(0,2,25);
const R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.1;document.body.appendChild(R.domElement);
const Cp=new EffectComposer(R);Cp.addPass(new RenderPass(S,C));const B=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.3,0.9);B.threshold=0.5;B.strength=1.3;B.radius=0.4;Cp.addPass(B);

S.add(new THREE.AmbientLight(0xffeedd,0.7));
const sun=new THREE.DirectionalLight(0xfff5e8,12);sun.position.set(30,60,20);S.add(sun);
const warm=new THREE.PointLight(0xffddaa,25,40);warm.position.set(-10,10,10);S.add(warm);

// Ground
const gGeo=new THREE.PlaneGeometry(80,80);const gMat=new THREE.MeshStandardMaterial({color:0xe8d5b0,roughness:0.9});const ground=new THREE.Mesh(gGeo,gMat);ground.rotation.x=-Math.PI/2;ground.position.y=-8;S.add(ground);

// Tiny sunflower
const sfGroup=new THREE.Group();sfGroup.position.set(0,-3,0);
const sfStem=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,5,6),new THREE.MeshStandardMaterial({color:0x5a7a3a}));sfStem.position.y=2;sfGroup.add(sfStem);
for(let i=0;i<14;i++){const a=i/14*Math.PI*2;const p=new THREE.Mesh(new THREE.SphereGeometry(0.3,4,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.13,0.7,0.4+Math.random()*0.4)}));p.scale.set(1,0.15,0.6);p.position.set(Math.cos(a)*0.7,5,Math.sin(a)*0.7);p.rotation.y=-a;sfGroup.add(p);}
const sfCenter=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.35,0.6,12),new THREE.MeshStandardMaterial({color:0x5a4a20}));sfCenter.position.y=5;sfGroup.add(sfCenter);
S.add(sfGroup);

// Dewdrop
const LOADER=new GLTFLoader();
let dewMesh=null;
LOADER.load('dewdrop.glb',g=>{dewMesh=g.scene;dewMesh.scale.setScalar(1.2);dewMesh.position.set(0,5,0);S.add(dewMesh);});

// Galaxy inside dewdrop
const GN=1500;const gGeo2=new THREE.BufferGeometry();const gPos=new Float32Array(GN*3);
for(let i=0;i<GN;i++){const a=Math.random()*Math.PI*2;const phi=Math.acos(2*Math.random()-1);const r=Math.random()*4;gPos[i*3]=Math.cos(a)*Math.sin(phi)*r;gPos[i*3+1]=Math.sin(a)*Math.sin(phi)*r;gPos[i*3+2]=Math.cos(phi)*r;}
gGeo2.setAttribute('position',new THREE.BufferAttribute(gPos,3));
const gM=new THREE.PointsMaterial({color:0xaa88cc,size:0.06,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false});
const galaxyInside=new THREE.Points(gGeo2,gM);galaxyInside.position.set(0,5,0);S.add(galaxyInside);

// Upgraded butterfly
function createButterfly(x,y,z){
  const b=new THREE.Group();b.position.set(x,y,z);
  const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.1,0.4,4,6),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.4}));b.add(body);
  for(let side of[-1,1]){const wing=new THREE.Mesh(new THREE.SphereGeometry(0.3,6,6),new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.1,emissive:0xffeedd,emissiveIntensity:0.3}));wing.scale.set(0.8,0.05,1);wing.position.set(side*0.3,0.1,0);b.add(wing);}
  b.userData={speed:0.3+Math.random()*0.5,amp:1+Math.random()*2,phase:Math.random()*Math.PI*2};
  return b;
}
const butterflies=[];
for(let i=0;i<8;i++){const bf=createButterfly(5+Math.random()*10,3+Math.random()*8,-5+Math.random()*5);butterflies.push(bf);S.add(bf);}

// Logo particles
function createLogoParticles(){
  const c=document.createElement('canvas');c.width=512;c.height=80;
  const ctx=c.getContext('2d');ctx.fillStyle='#ffffff';ctx.font='900 60px "Playfair Display",serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('ANDREAM',256,40);
  const d=ctx.getImageData(0,0,512,80).data;const pts=[];
  for(let y=0;y<80;y+=2){for(let x=0;x<512;x+=2){if(d[(y*512+x)*4+3]>100)pts.push({x:(x-256)*0.06,y:(40-y)*0.06});}}
  const geo=new THREE.BufferGeometry();const pos=new Float32Array(pts.length*3),td=new Float32Array(pts.length*3);
  for(let i=0;i<pts.length;i++){const r=Math.random()*15+5;const a=Math.random()*Math.PI*2;pos[i*3]=Math.cos(a)*r;pos[i*3+1]=Math.sin(a)*r+2;pos[i*3+2]=(Math.random()-0.5)*8;td[i*3]=pts[i].x;td[i*3+1]=pts[i].y+2;td[i*3+2]=0;}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color:0x2a2218,size:0.2,transparent:true,opacity:0,blending:THREE.NormalBlending,depthWrite:false});
  const mesh=new THREE.Points(geo,mat);S.add(mesh);
  return{mesh,geo,pos,td,count:pts.length,mat};
}
const logoData=createLogoParticles();

let remoteProgress=0;let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.00015;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

function animate(t){requestAnimationFrame(animate);const s=t*0.001,cp=progress||0.001;
C.position.z=25-cp*20;C.position.y=2-cp*2;C.lookAt(0,4,0);

// Dewdrop shrinks as camera pulls back
if(dewMesh){dewMesh.scale.setScalar(1.2-cp);}
galaxyInside.scale.setScalar(1-cp);

// Galaxy rotates, fades
galaxyInside.rotation.y+=0.015;galaxyInside.rotation.x+=0.008;

// Background: warm → white
S.background=new THREE.Color().setHSL(0.1,0.3,0.93+cp*0.07);
if(cp>0.7){S.background=new THREE.Color().setHSL(0,0,0.93+(cp-0.7)*0.23);}

// Butterfly flies away
butterflies.forEach(b=>{b.position.x-=(0.3+cp*0.5)*0.03;b.position.y+=Math.sin(s*b.userData.phase)*b.userData.amp*0.03;b.position.z+=0.02;if(b.position.x<-15)b.position.x=10;});

// Logo particles assemble
if(cp>0.6){const fa=(cp-0.6)*2.5;logoData.mat.opacity=Math.min(0.85,fa);const p=logoData.pos,d=logoData.td;
  for(let i=0;i<logoData.count;i++){const i3=i*3;p[i3]+=(d[i3]-p[i3])*0.04;p[i3+1]+=(d[i3+1]-p[i3+1])*0.04;p[i3+2]+=(d[i3+2]-p[i3+2])*0.04;}
  logoData.geo.attributes.position.needsUpdate=true;
}

// HTML overlay for final touch
if(cp>0.85){document.getElementById('logoText').style.opacity=(cp-0.85)/0.15;}

document.getElementById('hint').style.opacity=progress>0.05?'0':'1';Cp.render();}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;C.aspect=w/h;C.updateProjectionMatrix();R.setSize(w,h);Cp.setSize(w,h);});
</script></body></html>
