<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Act X — And...</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#fff;overflow:hidden;height:100vh;cursor:none;font-family:'Playfair Display',serif;display:flex;align-items:center;justify-content:center;flex-direction:column;}
canvas{position:fixed;inset:0;z-index:0;}
#overlay{position:relative;z-index:10;text-align:center;pointer-events:none;opacity:0;transition:opacity 3s ease;}
#overlay .logo{font-size:clamp(32px,7vw,72px);font-weight:900;letter-spacing:0.15em;color:#1a1a1a;}
#overlay .sub{font-size:clamp(14px,2vw,20px);color:#555;margin-top:12px;font-style:italic;letter-spacing:0.1em;}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-size:12px;color:rgba(0,0,0,0.3);letter-spacing:0.1em;transition:opacity 1s ease}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script></head><body>
<div id="overlay"><div class="logo">ANDREAM</div><div class="sub">Continue.</div></div>
<div id="hint">scroll —</div>
<script type="module">
import * as THREE from 'three';import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const S=new THREE.Scene();S.background=new THREE.Color(0xffffff);
const C=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,100);
const R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));document.body.appendChild(R.domElement);
const Cp=new EffectComposer(R);Cp.addPass(new RenderPass(S,C));const B=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.5,0.3,0.9);B.threshold=0.3;B.strength=1.5;B.radius=0.6;Cp.addPass(B);

S.add(new THREE.AmbientLight(0xffffff,0.8));

// Giant dewdrop at center
const dewGeo=new THREE.SphereGeometry(5,48,48);
const dewMat=new THREE.MeshPhysicalMaterial({color:0xffffff,roughness:0,metalness:0,transmission:0.9,thickness:2,envMapIntensity:0});
const dewdrop=new THREE.Mesh(dewGeo,dewMat);dewdrop.position.set(0,0,0);S.add(dewdrop);

// Galaxy particles inside dewdrop
const GN=1000;const gGeo=new THREE.BufferGeometry();const gPos=new Float32Array(GN*3);
for(let i=0;i<GN;i++){const a=Math.random()*Math.PI*2;const phi=Math.acos(2*Math.random()-1);const r=Math.random()*3;gPos[i*3]=Math.cos(a)*Math.sin(phi)*r;gPos[i*3+1]=Math.sin(a)*Math.sin(phi)*r;gPos[i*3+2]=Math.cos(phi)*r;}
gGeo.setAttribute('position',new THREE.BufferAttribute(gPos,3));
const gMat=new THREE.PointsMaterial({color:0x8888cc,size:0.05,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false});
const galaxy=new THREE.Points(gGeo,gMat);S.add(galaxy);

// Single white butterfly
const butterfly=new THREE.Group();
const bw=new THREE.Mesh(new THREE.SphereGeometry(0.15,4,4),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:0.5}));
butterfly.add(bw);
S.add(butterfly);butterfly.position.set(8,3,-10);

let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.00015;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

function animate(t){requestAnimationFrame(animate);const s=t*0.001,cp=progress||0.001;
C.position.z=20-cp*25;C.position.y=Math.sin(cp*0.5)*2;
C.lookAt(0,0,0);

// Dewdrop dissolves
dewdrop.material.opacity=1-cp;
dewdrop.scale.setScalar(1+cp*2);

// Background fades from white
S.background=new THREE.Color().setHSL(0,0,1-cp*0.5);
if(cp>0.5){S.background=new THREE.Color().setHSL(0,0,0.5+(1-cp));}

// Galaxy
galaxy.rotation.y+=0.01;galaxy.rotation.x+=0.005;
butterfly.position.x=8-cp*12;butterfly.position.y=3+Math.sin(s)*2;

// Overlay
if(cp>0.6){document.getElementById('overlay').style.opacity=(cp-0.6)/0.4;}
document.getElementById('hint').style.opacity=progress>0.05?'0':'1';Cp.render();}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;C.aspect=w/h;C.updateProjectionMatrix();R.setSize(w,h);Cp.setSize(w,h);});
</script></body></html>
