<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Act VII — The Rain of Pearls</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;height:100vh;cursor:none}canvas{display:block}#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;transition:opacity 1s ease}
</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script></head><body>
<div id="hint">scroll —</div>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const S=new THREE.Scene();S.background=new THREE.Color(0x0a0a1e);S.fog=new THREE.FogExp2(0x0a0a1e,0.00025);
const C=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200);C.position.set(0,40,0);
const R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.2;document.body.appendChild(R.domElement);
const Cp=new EffectComposer(R);Cp.addPass(new RenderPass(S,C));const B=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.3,0.3,0.9);B.threshold=0.6;B.strength=1.2;B.radius=0.3;Cp.addPass(B);

S.add(new THREE.AmbientLight(0x1a1a33,0.5));
const moonLight=new THREE.DirectionalLight(0xaaccff,8);moonLight.position.set(5,60,10);S.add(moonLight);
const fill=new THREE.PointLight(0xffccdd,20,60);fill.position.set(-10,20,20);S.add(fill);

// Water surface
const wGeo=new THREE.PlaneGeometry(60,60);
const wMat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0}},vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`uniform float uTime;varying vec2 vUv;float n(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}void main(){float r=n(vUv*30.0+uTime*0.08)*0.5+n(vUv*60.0-uTime*0.12)*0.3;vec3 c=mix(vec3(0.7,0.8,0.95),vec3(0.9,0.85,0.95),r);gl_FragColor=vec4(c,0.85);}`,transparent:true,depthWrite:false});
const water=new THREE.Mesh(wGeo,wMat);water.rotation.x=-Math.PI/2;water.position.y=-3;S.add(water);

// Pearls (falling)
const PN=300;const pGeo=new THREE.BufferGeometry();const pPos=new Float32Array(PN*3),pD=new Float32Array(PN*3);
for(let i=0;i<PN;i++){pPos[i*3]=(Math.random()-0.5)*40;pPos[i*3+1]=Math.random()*35+5;pPos[i*3+2]=(Math.random()-0.5)*30;pD[i*3]=Math.random()*Math.PI*2;pD[i*3+1]=0.3+Math.random()*0.8;pD[i*3+2]=(Math.random()-0.5)*0.5;}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({color:0xffffff,size:0.3,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false});
const pearls=new THREE.Points(pGeo,pMat);S.add(pearls);

// Lilies on water
const lilies=[];
function makeLily(x,z){
  const g=new THREE.Group();g.position.set(x,0.1,z);
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2;const petal=new THREE.Mesh(new THREE.SphereGeometry(0.4,4,4),new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.3,emissive:0x222233,emissiveIntensity:0.1}));petal.scale.set(1,0.1,0.5);petal.position.set(Math.cos(a)*0.5,0,Math.sin(a)*0.5);petal.rotation.y=-a;g.add(petal);}
  const center=new THREE.Mesh(new THREE.SphereGeometry(0.2,6,6),new THREE.MeshStandardMaterial({color:0xffffcc,emissive:0xffeecc,emissiveIntensity:0.3}));g.add(center);
  return g;
}
for(let i=0;i<40;i++){const l=makeLily((Math.random()-0.5)*40,(Math.random()-0.5)*30-5);lilies.push(l);S.add(l);}

// Butterflies
const BN=200;const bGeo=new THREE.BufferGeometry();const bPos=new Float32Array(BN*3),bD=new Float32Array(BN*3);
for(let i=0;i<BN;i++){bPos[i*3]=(Math.random()-0.5)*35;bPos[i*3+1]=3+Math.random()*20;bPos[i*3+2]=(Math.random()-0.5)*25-5;bD[i*3]=Math.random()*Math.PI*2;bD[i*3+1]=Math.random()*Math.PI*2;bD[i*3+2]=Math.random()*Math.PI*2;}
bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
const bMat=new THREE.PointsMaterial({color:0xffddff,size:0.1,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});S.add(new THREE.Points(bGeo,bMat));

let remoteProgress=0;let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.0002;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

const lookTarget=new THREE.Vector3(0,5,-5);
function animate(t){requestAnimationFrame(animate);const s=t*0.001,cp=progress||0.001;
  // Camera: overhead→horizontal→looking up
  const h=40-cp*70; // 40→-30
  const z=-30+cp*50; // far to near
  const y=5+cp*25; // 5→30
  C.position.set(Math.sin(cp*0.5)*10,h,z);
  lookTarget.set(0,cp>0.5?10:5,cp>0.7?-20:-5);
  C.lookAt(lookTarget);

  wMat.uniforms.uTime.value=s;
  // Pearls fall
  const pp=pGeo.attributes.position.array;
  for(let i=0;i<PN;i++){pp[i*3+1]-=pD[i*3+1]*0.06;pp[i*3]+=Math.sin(s+pD[i*3])*pD[i*3+2];if(pp[i*3+1]<-2){pp[i*3+1]=40;pp[i*3]=(Math.random()-0.5)*40;}}
  pGeo.attributes.position.needsUpdate=true;
  // Butterflies
  const bp=bGeo.attributes.position.array;
  for(let i=0;i<BN;i++){bp[i*3]+=Math.sin(s*2+bD[i*3])*0.04;bp[i*3+1]+=Math.cos(s*1.5+bD[i*3+1])*0.03;bp[i*3+2]+=Math.sin(s*1.8+bD[i*3+2])*0.03;}
  bGeo.attributes.position.needsUpdate=true;
  // Lilies drift up
  lilies.forEach(l=>{if(cp>0.6)l.position.y+=0.01;});

  document.getElementById('hint').style.opacity=progress>0.05?'0':'1';Cp.render();}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;C.aspect=w/h;C.updateProjectionMatrix();R.setSize(w,h);Cp.setSize(w,h);});
</script></body></html>
