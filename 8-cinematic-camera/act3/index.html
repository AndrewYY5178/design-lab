<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Act III — The Valley of Sunflowers</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;cursor:none;}
canvas{display:block;}
#title{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:clamp(16px,2.5vw,24px);color:rgba(255,255,255,0.5);letter-spacing:0.15em;transition:opacity 2s ease;}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;transition:opacity 1s ease;}
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
</head>
<body>
<div id="title">Act III · The Valley of Sunflowers</div>
<div id="hint">scroll —</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xfaf5e8);
scene.fog=new THREE.FogExp2(0xfaf0e0,0.00006);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,400);
camera.position.set(0,8,50);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
document.body.appendChild(renderer.domElement);

const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.4,0.3,0.9);
bloom.threshold=0.65;bloom.strength=0.7;bloom.radius=0.4;
composer.addPass(bloom);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff8ee,0.6));
const sun=new THREE.DirectionalLight(0xfff5e0,10);
sun.position.set(30,80,20);scene.add(sun);
const fill=new THREE.PointLight(0xffeebb,40,150);
fill.position.set(-20,10,30);scene.add(fill);

// ── Ground ──
const gGeo=new THREE.PlaneGeometry(300,200);
const gMat=new THREE.MeshStandardMaterial({color:0xf0ddb8,roughness:0.9});
const ground=new THREE.Mesh(gGeo,gMat);
ground.rotation.x=-Math.PI/2;ground.position.y=-5;
scene.add(ground);

// ── Sunflower field ──
const flowers=[];
function createSimpleFlower(x,z){
  const g=new THREE.Group();g.position.set(x,0,z);
  const center=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.8,12),new THREE.MeshStandardMaterial({color:0x5a4a20,roughness:0.7}));
  g.add(center);
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    const petal=new THREE.Mesh(new THREE.SphereGeometry(0.25,4,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.13,0.8,0.5+Math.random()*0.4),roughness:0.4}));
    petal.scale.set(1,0.2,0.6);petal.position.set(Math.cos(a)*0.6,0.1,Math.sin(a)*0.6);
    petal.rotation.y=-a;g.add(petal);
  }
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,3+Math.random()*2,6),new THREE.MeshStandardMaterial({color:0x5a7a3a,roughness:0.6}));
  stem.position.y=-2;g.add(stem);
  return g;
}
for(let i=0;i<800;i++){
  const x=(Math.random()-0.5)*120;
  const z=(Math.random()-0.5)*80-20;
  const f=createSimpleFlower(x,z);
  f.rotation.y=Math.random()*Math.PI*2;
  scene.add(f);flowers.push(f);
}

// ── Load detailed sunflower prototype ──
const loader=new GLTFLoader();
loader.load('sunflower.glb',gltf=>{
  for(let i=0;i<20;i++){
    const s=gltf.scene.clone(true);
    s.scale.setScalar(0.8+Math.random()*0.5);
    s.position.set((Math.random()-0.5)*60,0,(Math.random()-0.5)*40-10);
    s.rotation.y=Math.random()*Math.PI*2;
    scene.add(s);
  }
});

// ── White Deer ──
function createDeer(x,y,z){
  const d=new THREE.Group();d.position.set(x,y,z);
  const whiteMat=new THREE.MeshStandardMaterial({color:0xfafaf8,roughness:0.3,metalness:0.05});
  // Body
  d.add(new THREE.Mesh(new THREE.CapsuleGeometry(1.2,3,8,12),whiteMat));
  // Neck
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.5,4,8),whiteMat);
  neck.position.set(0,2.5,1.2);neck.rotation.x=0.6;d.add(neck);
  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),whiteMat);
  head.position.set(0,4.8,2.8);d.add(head);
  // Legs
  for(let lx of[-0.6,0.6])for(let lz of[-0.8,0.8]){
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.18,3.5,6),whiteMat);
    leg.position.set(lx,-2.5,lz);d.add(leg);
  }
  // Flower antlers
  const antlerMat=new THREE.MeshStandardMaterial({color:0xffeebb,roughness:0.3,emissive:0xffddaa,emissiveIntensity:0.3});
  for(let side of[-1,1]){
    for(let i=0;i<4;i++){
      const branch=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,1.5,6),new THREE.MeshStandardMaterial({color:0xddaa88,roughness:0.5}));
      branch.position.set(side*0.15,5.2+i*0.6,2.2+side*0.3);branch.rotation.z=side*0.5+i*0.2;d.add(branch);
      // Tiny flower bud at tip
      const bud=new THREE.Mesh(new THREE.SphereGeometry(0.12,4,4),antlerMat);
      bud.position.set(side*(0.3+i*0.4),5.8+i*0.6,2.5+side*0.5);d.add(bud);
    }
  }
  return d;
}
const deer=createDeer(0,0,-5);scene.add(deer);

// ── Feather particles ──
const FN=600;
const fGeo=new THREE.BufferGeometry();
const fPos=new Float32Array(FN*3),fData=new Float32Array(FN*4);
for(let i=0;i<FN;i++){
  fPos[i*3]=(Math.random()-0.5)*80;fPos[i*3+1]=Math.random()*30;fPos[i*3+2]=(Math.random()-0.5)*60-10;
  fData[i*3]=Math.random()*Math.PI*2;fData[i*3+1]=0.3+Math.random()*0.8;fData[i*3+2]=(Math.random()-0.5)*0.5;fData[i*3+3]=Math.random()*0.5;
}
fGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
const fMat=new THREE.PointsMaterial({color:0xffeebb,size:0.4,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
const feathers=new THREE.Points(fGeo,fMat);scene.add(feathers);

// ── Camera ──
let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.0002;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

function animate(t){
  requestAnimationFrame(animate);
  const s=t*0.001;
  const cp=progress||0.001;

  // Camera slow push through field
  camera.position.z=50-cp*70;
  camera.position.y=8-Math.sin(cp*1.5)*4;
  camera.position.x=Math.sin(cp*0.8)*8;
  camera.lookAt(camera.position.x,5,camera.position.z-15);

  // Deer walks across, pauses to look at camera
  deer.position.x=-20+cp*40;
  deer.position.z=-5+Math.sin(cp*2)*3;
  deer.rotation.y=Math.sin(s*0.3)*0.3;

  // Flowers sway
  flowers.forEach((f,i)=>{f.rotation.z=Math.sin(s*1.5+i*0.1)*0.15;});

  // Feathers float up
  const fp=fGeo.attributes.position.array;
  for(let i=0;i<FN;i++){fp[i*3+1]+=fData[i*3+1]*0.02;fp[i*3]+=Math.sin(s+fData[i*3])*fData[i*3+2];if(fp[i*3+1]>30)fp[i*3+1]=0;}
  fGeo.attributes.position.needsUpdate=true;

  document.getElementById('hint').style.opacity=progress>0.05?'0':'1';
  document.getElementById('title').style.opacity=progress>0.3?'0':'1';

  composer.render();
}
requestAnimationFrame(animate);

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);composer.setSize(w,h);
});
</script>
</body>
</html>
