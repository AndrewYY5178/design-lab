<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Act VI — The Garden Beneath the Moon</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;height:100vh;cursor:none}canvas{display:block}#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;transition:opacity 1s ease}
</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script></head><body>
<div id="hint">scroll —</div>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const S=new THREE.Scene();S.background=new THREE.Color(0x0a0818);S.fog=new THREE.FogExp2(0x0a0818,0.0004);
const C=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200);C.position.set(0,4,30);
const R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.3;document.body.appendChild(R.domElement);
const Cp=new EffectComposer(R);Cp.addPass(new RenderPass(S,C));const B=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.3,0.9);B.threshold=0.55;B.strength=1.3;B.radius=0.4;Cp.addPass(B);

S.add(new THREE.AmbientLight(0x221133,0.4));
const moon=new THREE.DirectionalLight(0xccccff,10);moon.position.set(10,50,-10);S.add(moon);
const pl=new THREE.PointLight(0x8866cc,20,40);pl.position.set(-15,8,5);S.add(pl);

// Giant moon
const moonGeo=new THREE.SphereGeometry(12,32,32);
const moonMat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0}},vertexShader:`varying vec3 vN;varying vec3 vP;void main(){vec4 wp=modelMatrix*vec4(position,1.0);vP=wp.xyz;vN=normalize(mat3(modelMatrix)*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,fragmentShader:`uniform float uTime;varying vec3 vN;varying vec3 vP;void main(){float g=dot(vN,normalize(vec3(0,1,-1)))*0.5+0.5;vec3 col=mix(vec3(0.85,0.8,0.95),vec3(0.95,0.9,1.0),g);col+=sin(vP.x*0.5+uTime)*0.02;gl_FragColor=vec4(col,1.0);}`});
const moonMesh=new THREE.Mesh(moonGeo,moonMat);moonMesh.position.set(0,35,-40);S.add(moonMesh);

// Tulips
const tulips=[];
function makeTulip(x,z){
  const g=new THREE.Group();g.position.set(x,0,z);
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,3,6),new THREE.MeshStandardMaterial({color:0x446644}));stem.position.y=1.5;g.add(stem);
  for(let i=0;i<5;i++){const a=i/5*Math.PI*2;const p=new THREE.Mesh(new THREE.SphereGeometry(0.15,4,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.8+Math.random()*0.15,0.7,0.5+Math.random()*0.3),emissive:new THREE.Color().setHSL(0.8,0.5,0.3),emissiveIntensity:0.3}));p.position.set(Math.cos(a)*0.2,3.2,Math.sin(a)*0.2);g.add(p);}
  const glow=new THREE.PointLight(0xcc88ff,0.3,3);glow.position.y=3.2;g.add(glow);
  return g;
}
for(let i=0;i<60;i++){const t=makeTulip((Math.random()-0.5)*50,(Math.random()-0.5)*40-5);tulips.push(t);S.add(t);}

// Shells
const shellPositions=[];
for(let i=0;i<12;i++){shellPositions.push({x:(Math.random()-0.5)*30,z:(Math.random()-0.5)*25-5});}
const LOADER=new GLTFLoader();
LOADER.load('shell_and_tulip.glb',g=>{
  shellPositions.forEach(p=>{
    const s=g.scene.clone(true);s.scale.setScalar(0.6+Math.random()*0.4);s.position.set(p.x,-1,p.z);s.rotation.y=Math.random()*Math.PI*2;S.add(s);
  });
});

// Fireflies
const FN=500;const fGeo=new THREE.BufferGeometry();const fPos=new Float32Array(FN*3),fD=new Float32Array(FN*3);
for(let i=0;i<FN;i++){fPos[i*3]=(Math.random()-0.5)*40;fPos[i*3+1]=Math.random()*15;fPos[i*3+2]=(Math.random()-0.5)*30-5;fD[i*3]=Math.random()*Math.PI*2;fD[i*3+1]=0.5+Math.random()*1.5;fD[i*3+2]=Math.random()*Math.PI*2;}
fGeo.setAttribute('position',new THREE.BufferAttribute(fPos,3));
const fM=new THREE.PointsMaterial({color:0xffffaa,size:0.12,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false});S.add(new THREE.Points(fGeo,fM));

let remoteProgress=0;let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.0002;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

function animate(t){requestAnimationFrame(animate);const s=t*0.001,cp=progress||0.001;
C.position.z=30-cp*45;C.position.y=4+Math.sin(cp)*2;C.position.x=Math.sin(cp*0.7)*6;C.lookAt(Math.sin(cp)*5,4,C.position.z-10);
moonMat.uniforms.uTime.value=s;
tulips.forEach((t,i)=>{t.rotation.y=Math.sin(s+i*0.1)*0.2;});
const fp=fGeo.attributes.position.array;for(let i=0;i<FN;i++){fp[i*3]+=Math.sin(s*3+fD[i*3])*fD[i*3+1]*0.03;fp[i*3+1]+=Math.cos(s*2+fD[i*3+2])*0.02;if(fp[i*3+1]>15||fp[i*3+1]<0){fp[i*3+1]=Math.random()*10;}}fGeo.attributes.position.needsUpdate=true;
document.getElementById('hint').style.opacity=progress>0.05?'0':'1';Cp.render();}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;C.aspect=w/h;C.updateProjectionMatrix();R.setSize(w,h);Cp.setSize(w,h);});
</script></body></html>
