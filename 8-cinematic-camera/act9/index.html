<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Act IX — The Birth of Dreams</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;height:100vh;cursor:none}canvas{display:block}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;transition:opacity 1s ease}
</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script></head><body><div id="hint">scroll —</div>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const S=new THREE.Scene();S.background=new THREE.Color(0x000010);
const C=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,150);C.position.set(0,0,45);
const R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.4;document.body.appendChild(R.domElement);
const Cp=new EffectComposer(R);Cp.addPass(new RenderPass(S,C));const B=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.3,0.3,0.95);B.threshold=0.4;B.strength=2.0;B.radius=0.4;Cp.addPass(B);

S.add(new THREE.AmbientLight(0x111133,0.3));
const core=new THREE.PointLight(0xffffff,5,80);core.position.set(0,0,0);S.add(core);

// Spiral particles
const SN=4000;const sGeo=new THREE.BufferGeometry();const sPos=new Float32Array(SN*3),sD=new Float32Array(SN*3);
for(let i=0;i<SN;i++){const a=Math.random()*Math.PI*2;const phi=Math.acos(2*Math.random()-1);const r=10+Math.random()*50;sPos[i*3]=Math.cos(a)*Math.sin(phi)*r;sPos[i*3+1]=Math.sin(a)*Math.sin(phi)*r;sPos[i*3+2]=Math.cos(phi)*r;sD[i*3]=r;sD[i*3+1]=a;sD[i*3+2]=phi;}
sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
const sM=new THREE.PointsMaterial({color:0xd8ccff,size:0.15,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false});S.add(new THREE.Points(sGeo,sM));

// Colorful rings
const rings=[];
for(let c=0;c<6;c++){const RN=600;const rGeo=new THREE.BufferGeometry();const rPos=new Float32Array(RN*3);
  for(let i=0;i<RN;i++){const a=i/RN*Math.PI*2;const r=6+c*3+Math.random();rPos[i*3]=Math.cos(a)*r;rPos[i*3+1]=(Math.random()-0.5)*1.2;rPos[i*3+2]=Math.sin(a)*r;}
  rGeo.setAttribute('position',new THREE.BufferAttribute(rPos,3));
  const col=[0xffddcc,0xddffcc,0xccddff,0xffccdd,0xffffcc,0xddffff][c];
  const rM=new THREE.PointsMaterial({color:col,size:0.12,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
  const ring=new THREE.Points(rGeo,rM);ring.rotation.x=Math.random()*Math.PI;ring.rotation.y=Math.random()*Math.PI;S.add(ring);rings.push({mesh:ring,speed:0.08+c*0.04});
}

// Seed
const LOADER=new GLTFLoader();
let seedMesh=null;
LOADER.load('seed.glb',g=>{seedMesh=g.scene;seedMesh.scale.setScalar(1.5);seedMesh.position.set(0,0,0);S.add(seedMesh);});

// Particle text (render "AndDream" to canvas, sample pixels)
const textParticles=[];
function createTextParticles(){
  const canvas=document.createElement('canvas');canvas.width=512;canvas.height=80;
  const ctx=canvas.getContext('2d');ctx.fillStyle='#ffffff';ctx.font='900 60px "Playfair Display",serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('ANDREAM',256,40);
  const data=ctx.getImageData(0,0,512,80).data;
  const points=[];
  for(let y=0;y<80;y+=2){for(let x=0;x<512;x+=2){const i=(y*512+x)*4;if(data[i+3]>100){points.push({x:(x-256)*0.06,y:(40-y)*0.06,z:0});}}}
  const tGeo=new THREE.BufferGeometry();const tPos=new Float32Array(points.length*3),tD=new Float32Array(points.length*3);
  for(let i=0;i<points.length;i++){const r=Math.random()*20+5;const a=Math.random()*Math.PI*2;tPos[i*3]=Math.cos(a)*r;tPos[i*3+1]=Math.sin(a)*r;tPos[i*3+2]=(Math.random()-0.5)*10;tD[i*3]=points[i].x;tD[i*3+1]=points[i].y;tD[i*3+2]=0;}
  tGeo.setAttribute('position',new THREE.BufferAttribute(tPos,3));
  const tM=new THREE.PointsMaterial({color:0xffffff,size:0.2,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
  const tMesh=new THREE.Points(tGeo,tM);S.add(tMesh);
  return{tMesh,tGeo,tPos,tD,count:points.length,tM};
}
const textData=createTextParticles();

let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.00015;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

function animate(t){requestAnimationFrame(animate);const s=t*0.001,cp=progress||0.001;
C.position.z=45-cp*35;C.lookAt(0,0,0);

// Spiral particles converge
const sp=sGeo.attributes.position.array;
for(let i=0;i<SN;i++){const tr=2+(cp*10);const cr=sD[i*3]/tr;sp[i*3]+=(Math.cos(sD[i*3+1])*Math.sin(sD[i*3+2])*cr-sp[i*3])*0.015;sp[i*3+1]+=(Math.sin(sD[i*3+1])*Math.sin(sD[i*3+2])*cr-sp[i*3+1])*0.015;sp[i*3+2]+=(Math.cos(sD[i*3+2])*cr-sp[i*3+2])*0.015;}
sGeo.attributes.position.needsUpdate=true;

// Rings rotate
rings.forEach(r=>{r.mesh.rotation.x+=r.speed*0.01;r.mesh.rotation.y+=r.speed*0.015;});

// Seed grows
if(seedMesh){seedMesh.scale.setScalar(1+cp*4);seedMesh.rotation.y+=0.01;}
core.intensity=5+cp*90;

// Text particles assemble (after spiral converges)
if(cp>0.5){
  const tp=textData.tPos,td=textData.tD;const fa=(cp-0.5)*2; // 0→1
  textData.tM.opacity=fa;
  for(let i=0;i<textData.count;i++){const i3=i*3;tp[i3]+=(td[i3]-tp[i3])*0.03;tp[i3+1]+=(td[i3+1]-tp[i3+1])*0.03;tp[i3+2]+=(td[i3+2]-tp[i3+2])*0.03;}
  textData.tGeo.attributes.position.needsUpdate=true;
}

document.getElementById('hint').style.opacity=progress>0.05?'0':'1';Cp.render();}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;C.aspect=w/h;C.updateProjectionMatrix();R.setSize(w,h);Cp.setSize(w,h);});
</script></body></html>
