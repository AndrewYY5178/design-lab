<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Act VIII — The Deer Between Stars</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;height:100vh;cursor:none}canvas{display:block}#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;font-family:'Playfair Display',serif;font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.1em;transition:opacity 1s ease}
</style><script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script></head><body><div id="hint">scroll —</div>
<script type="module">
import * as THREE from 'three';import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const S=new THREE.Scene();S.background=new THREE.Color(0x020210);S.fog=new THREE.FogExp2(0x020210,0.00015);
const C=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,250);C.position.set(0,5,35);
const R=new THREE.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.toneMapping=THREE.ACESFilmicToneMapping;R.toneMappingExposure=1.3;document.body.appendChild(R.domElement);
const Cp=new EffectComposer(R);Cp.addPass(new RenderPass(S,C));const B=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.3,0.9);B.threshold=0.5;B.strength=1.4;B.radius=0.5;Cp.addPass(B);

S.add(new THREE.AmbientLight(0x111133,0.3));
const starLight=new THREE.DirectionalLight(0x8888cc,6);starLight.position.set(10,30,-20);S.add(starLight);

// Galaxy (spiral particle ring)
const GN=3000;const gGeo=new THREE.BufferGeometry();const gPos=new Float32Array(GN*3);
for(let i=0;i<GN;i++){const a=Math.random()*Math.PI*2;const r=5+Math.random()*80;const v=r*0.1;gPos[i*3]=Math.cos(a+v)*r;gPos[i*3+1]=(Math.random()-0.5)*20+20;gPos[i*3+2]=Math.sin(a+v)*r-20;}
gGeo.setAttribute('position',new THREE.BufferAttribute(gPos,3));
const gMat=new THREE.PointsMaterial({color:0xaaaadd,size:0.3,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false});S.add(new THREE.Points(gGeo,gMat));

// Cliff
const LOADER=new GLTFLoader();
LOADER.load('cliff.glb',g=>{const c=g.scene;c.scale.setScalar(1.5);c.position.set(0,-15,-10);S.add(c);});

// Upgraded deer
function createStarDeer(x,y,z){
  const d=new THREE.Group();d.position.set(x,y,z);
  const w=new THREE.MeshStandardMaterial({color:0xfafaf8,roughness:0.2,metalness:0.05,emissive:0x333344,emissiveIntensity:0.2});
  d.add(new THREE.Mesh(new THREE.CapsuleGeometry(1.2,3,8,12),w));
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.5,4,8),w);neck.position.set(0,2.5,1.2);neck.rotation.x=0.6;d.add(neck);
  d.add(new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),w)).position.set(0,4.8,2.8);
  for(let lx of[-0.6,0.6])for(let lz of[-0.8,0.8]){d.add(new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.18,3.5,6),w)).position.set(lx,-2.5,lz);}
  // Grand antlers with glowing buds
  const budMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.1,emissive:0xffffff,emissiveIntensity:0.5});
  for(let side of[-1,1]){
    for(let i=0;i<6;i++){
      const br=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,2,6),new THREE.MeshStandardMaterial({color:0xddbbaa,roughness:0.4}));
      br.position.set(side*(0.2+i*0.35),5+i*0.7,2+side*0.3);br.rotation.z=side*(0.3+i*0.15);d.add(br);
      const bud=new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),budMat);bud.position.set(side*(0.3+i*0.4),6+i*0.7,2.5+side*0.4);d.add(bud);
    }
  }
  return d;
}
const deer=createStarDeer(0,0,-8);S.add(deer);

// Butterfly swarm
const BN=400;const bGeo=new THREE.BufferGeometry();const bPos=new Float32Array(BN*3),bD=new Float32Array(BN*3);
for(let i=0;i<BN;i++){bPos[i*3]=(Math.random()-0.5)*40;bPos[i*3+1]=Math.random()*25;bPos[i*3+2]=(Math.random()-0.5)*30-5;bD[i*3]=Math.random()*Math.PI*2;bD[i*3+1]=Math.random()*Math.PI*2;bD[i*3+2]=Math.random()*Math.PI*2;}
bGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3));
const bM=new THREE.PointsMaterial({color:0xffddff,size:0.12,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending,depthWrite:false});S.add(new THREE.Points(bGeo,bM));

let remoteProgress=0;let progress=0;
function onWheel(e){e.preventDefault();progress+=e.deltaY*0.0002;progress=Math.max(0,Math.min(1,progress));}
window.addEventListener('wheel',onWheel,{passive:false});

function animate(t){requestAnimationFrame(animate);const s=t*0.001,cp=progress||0.001;
C.position.z=35-cp*50;C.position.y=5+Math.sin(cp)*5;C.position.x=Math.sin(cp*0.7)*10;C.lookAt(0,4,C.position.z-10);
deer.rotation.y=Math.sin(s*0.2)*0.3;deer.position.y=-cp*2;
if(cp>0.7){deer.scale.setScalar(1-(cp-0.7)*3);deer.position.y-=5*(cp-0.7);}
const bp=bGeo.attributes.position.array;
for(let i=0;i<BN;i++){bp[i*3]+=Math.sin(s*3+bD[i*3])*0.05;bp[i*3+1]+=Math.cos(s*2+bD[i*3+1])*0.04;bp[i*3+2]+=Math.sin(s*2.5+bD[i*3+2])*0.04;}
bGeo.attributes.position.needsUpdate=true;
document.getElementById('hint').style.opacity=progress>0.05?'0':'1';Cp.render();}
requestAnimationFrame(animate);
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;C.aspect=w/h;C.updateProjectionMatrix();R.setSize(w,h);Cp.setSize(w,h);});
</script></body></html>
