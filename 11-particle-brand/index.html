<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndDream · Every Ending Begins With an &ldquo;And&rdquo;</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0c;overflow:hidden;font-family:'Playfair Display','Noto Serif SC',serif;-webkit-font-smoothing:antialiased}
  canvas{display:block;position:fixed;inset:0;z-index:0}

  /* Overlay */
  .overlay{position:fixed;inset:0;z-index:1;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .brand{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,56px);font-weight:900;letter-spacing:0.15em;color:rgba(245,244,240,0.92);text-shadow:0 0 60px rgba(200,180,240,0.3);}
  .tagline{font-size:clamp(12px,1.8vw,16px);color:rgba(245,244,240,0.5);margin-top:16px;letter-spacing:0.12em;text-align:center;line-height:2;}
  .sub{font-size:11px;color:rgba(255,255,255,0.25);margin-top:40px;letter-spacing:0.2em;}

  /* Grain overlay */
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:2;opacity:.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:128px 128px;}

  /* Controls */
  .controls{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:480px;}
  .controls button{font-family:inherit;font-size:11px;letter-spacing:0.08em;padding:7px 14px;border:1px solid rgba(255,255,255,0.12);border-radius:20px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.55);cursor:pointer;transition:all .3s;}
  .controls button:hover,.controls button.active{background:rgba(200,180,240,0.1);border-color:rgba(200,180,240,0.25);color:rgba(255,255,255,0.9);}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="overlay">
  <div class="brand">AND<span style="color:rgba(200,180,240,0.5)">·</span>DREAM</div>
  <div class="tagline">每一个结束之后，还有一个 And<br>Every ending begins with an &ldquo;And.&rdquo;</div>
  <div class="sub">ANDREW&rsquo;S DREAM · THE DREAM NEVER ENDS · EST. 2026</div>
</div>

<div class="controls">
  <button class="active" data-shape="dream">梦</button>
  <button data-shape="journey">行</button>
  <button data-shape="flow">流</button>
  <button data-shape="wild">野</button>
  <button data-shape="light">光</button>
  <button data-shape="wave">波</button>
  <button data-shape="pulse">脉</button>
  <button data-shape="root">根</button>
  <button data-shape="cocoon">茧</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ── Scene ──
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 9;

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
document.body.prepend(renderer.domElement);

// ── Particles ──
const COUNT = 60000;
const geo = new THREE.BufferGeometry();
const positions = new Float32Array(COUNT * 3);
const colors = new Float32Array(COUNT * 3);
const sizes = new Float32Array(COUNT);

// AndDream palette: deep indigo + copper + lavender
const palette = [
  new THREE.Color('#b8b0e8'), // lavender
  new THREE.Color('#d8c8a0'), // warm copper
  new THREE.Color('#c0d0f0'), // soft blue
  new THREE.Color('#e8d8f0'), // lilac
  new THREE.Color('#a0b8d8'), // muted blue
  new THREE.Color('#8880b8'), // deep violet
  new THREE.Color('#e0d0b0'), // pale gold
];

for(let i=0;i<COUNT;i++){
  const c = palette[Math.floor(Math.random()*palette.length)];
  colors[i*3]=c.r;colors[i*3+1]=c.g;colors[i*3+2]=c.b;
  sizes[i] = Math.random() * 0.018 + 0.004;
}

geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));

// Use PointsMaterial with size attenuation for depth
const mat = new THREE.PointsMaterial({
  size:0.025,vertexColors:true,blending:THREE.AdditiveBlending,
  depthWrite:false,transparent:true,opacity:0.9,
  sizeAttenuation:true,
});
const points = new THREE.Points(geo,mat);
scene.add(points);

// ── Shape generators ──
// ── Shape generators ──
function dream(i,total){
  const phi = Math.acos(-1 + (2*i+1)/total);
  const theta = Math.sqrt(total * Math.PI) * phi;
  const r = 3 + Math.sin(i*0.015+phi)*0.3;
  return [r*Math.cos(theta)*Math.sin(phi), r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi)];
}
function journey(i,total){
  const t = i/total * Math.PI * 10;
  const r = 2.2 + Math.sin(t*0.3)*0.4;
  const y = (i/total-0.5)*8;
  return [r*Math.cos(t), y, r*Math.sin(t)];
}
function flow(i,total){
  const arms = 5;
  const arm = i%arms;
  const t = (i/total) * Math.PI * 7;
  const r = t * 0.7 + 0.3;
  const twist = t*0.15 + arm * Math.PI*2/arms;
  const angle = t + twist + Math.sin(t*2)*0.2;
  const height = (Math.random()-0.5)*r*0.4;
  return [r*Math.cos(angle), height, r*Math.sin(angle)];
}
function wild(i,total){
  const r = 4.5 * Math.cbrt(Math.random());
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  return [r*Math.cos(theta)*Math.sin(phi), r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi)];
}
function light(i,total){
  const t = i/total * Math.PI * 2;
  const ringR = 2.8 + Math.sin(t*3)*0.3;
  const ringY = (i/total-0.5)*3 + Math.cos(t*5)*0.3;
  const ringIdx = i%5; // 5 nested rings
  const r = 1.5 + ringIdx*0.4 + Math.sin(t*7+ringIdx)*0.15;
  return [r*Math.cos(t), ringY, r*Math.sin(t)];
}
function wave(i,total){
  const cols = Math.ceil(Math.sqrt(total/2));
  const x = (i%cols)/cols*7 - 3.5;
  const z = (Math.floor(i/cols))/cols*7 - 3.5;
  const y = Math.sin(x*2)*0.6 + Math.cos(z*2)*0.6 + Math.sin((x+z)*1.5)*0.4;
  return [x, y*1.8, z];
}
function pulse(i,total){
  const rings = 8;
  const ring = i%rings;
  const t = i/total * Math.PI * 2;
  const r = 0.3 + ring*0.45 + Math.sin(t*4+ring)*0.12;
  const y = Math.sin(ring*1.2)*2.5 + Math.cos(t*3)*0.3;
  return [r*Math.cos(t), y, r*Math.sin(t)];
}
function root(i,total){
  const branchIdx = i%7;
  const t = i/total;
  const baseAngle = branchIdx * Math.PI*2/7;
  const len = 3.5 * t;
  const spread = t * 1.8;
  const subAngle = baseAngle + Math.sin(t*8+branchIdx)*0.5;
  const x = Math.cos(subAngle)*spread + Math.sin(t*10+branchIdx)*0.3;
  const y = t*5 - 2 - t*t*2;
  const z = Math.sin(subAngle)*spread + Math.cos(t*10+branchIdx)*0.3;
  return [x, y, z];
}
function cocoon(i,total){
  const layers = 6;
  const layer = i%layers;
  const t = i/total * Math.PI * 2;
  const phi = Math.acos(-1 + (2*i+1)/total);
  const r = 1.2 + layer*0.4 + Math.sin(t*5+layer)*0.2 + Math.cos(phi*3)*0.25;
  return [r*Math.cos(t)*Math.sin(phi), r*Math.sin(t)*Math.sin(phi)*1.3, r*Math.cos(phi)];
}

const shapes = {dream,journey,flow,wild,light,wave,pulse,root,cocoon};
let current = 'dream';
let target = new Float32Array(COUNT*3);
let morphT = 1;

function setTarget(shape){
  const fn = shapes[shape];
  for(let i=0;i<COUNT;i++){const p=fn(i,COUNT);target[i*3]=p[0];target[i*3+1]=p[1];target[i*3+2]=p[2];}
  morphT=0;
}

setTarget('dream');

// ── Controls ──
document.querySelectorAll('.controls button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    setTarget(btn.dataset.shape);
  });
});

// ── Loop ──
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time+=0.004;
  morphT = Math.min(1, morphT+0.015);

  // Ease-out morph
  const t = 1 - Math.pow(1-morphT,3);
  for(let i=0;i<COUNT;i++){
    const i3=i*3;
    positions[i3] += (target[i3]-positions[i3])*0.08;
    positions[i3+1] += (target[i3+1]-positions[i3+1])*0.08;
    positions[i3+2] += (target[i3+2]-positions[i3+2])*0.08;
  }
  geo.attributes.position.needsUpdate=true;

  points.rotation.y += 0.001;
  camera.position.x = Math.sin(time*0.3)*1.5;
  camera.position.z = 8 + Math.sin(time*0.2)*0.5;
  camera.lookAt(0,0,0);

  renderer.render(scene,camera);
}
animate();

// ── Resize ──
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
