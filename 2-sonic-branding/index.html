<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AndDream — The Dream That Continues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Crimson+Pro:ital,wght@0,300;0,400;1,400&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;height:100vh;width:100vw;overscroll-behavior:none;-webkit-overscroll-behavior:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#vignette{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(5,5,8,0.8) 100%)}
#grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px 128px}

#loading{position:fixed;inset:0;z-index:100;background:#050508;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease}
#loading.hidden{opacity:0;visibility:hidden;pointer-events:none}
#loading .logo{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,40px);font-weight:900;letter-spacing:.15em;color:#E8E6E1}
#loading .sub{font-family:'Crimson Pro',serif;font-size:13px;color:#555;margin-top:14px;letter-spacing:.1em;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

#scroll-hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:3;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:8px;transition:opacity .8s ease}
#scroll-hint.faded{opacity:.15}
#scroll-hint .ring{width:36px;height:36px;border:1px solid rgba(255,255,255,.2);border-radius:50%;position:relative}
#scroll-hint .ring::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);width:2px;height:10px;background:rgba(255,255,255,.5);border-radius:2px}
#scroll-hint span{font-family:'Crimson Pro',serif;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.15em}
@media(prefers-reduced-motion:reduce){@keyframes pulse{0%,100%{opacity:.5}}}
</style>
</head>
<body>

<div id="loading"><div class="logo">ANDREAM</div><div class="sub">Entering the dream...</div></div>
<div id="vignette"></div><div id="grain"></div>
<div id="scroll-hint"><div class="ring"></div><span>ORBIT</span></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}

<script type="module">
import * as THREE from 'three';

const loadingEl = document.getElementById('loading');
const scrollHint = document.getElementById('scroll-hint');

// ============================================================
// SCENE
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.0025);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ============================================================
// ENV MAP
// ============================================================
function genEnv() {
  const pm = new THREE.PMREMGenerator(renderer);
  const s = new THREE.Scene(); s.background = new THREE.Color(0x050508);

  // Rainbow-colored emissive spheres for kaleidoscopic reflections
  const colors = [
    {col:0xff4433, pos:[0,18,6]},      // warm red
    {col:0xff6633, pos:[-5,14,8]},     // red — second angle
    {col:0xff9933, pos:[10,10,12]},     // amber
    {col:0xffcc33, pos:[15,4,-6]},      // golden yellow
    {col:0x44ee88, pos:[8,-8,-14]},     // emerald green
    {col:0x3366aa, pos:[-8,-6,-14]},    // blue — dimmer
    {col:0x6644aa, pos:[-15,5,-4]},     // violet — muted
    {col:0xff55aa, pos:[-10,12,6]},     // pink/magenta
  ];
  colors.forEach(({col,pos})=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(4,16,16),new THREE.MeshBasicMaterial({color:col}));
    m.position.set(...pos);s.add(m);
  });

  const g=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.MeshBasicMaterial({color:0x020204,side:THREE.DoubleSide}));
  g.rotation.x=-Math.PI/2;g.position.y=-18;s.add(g);
  const m=pm.fromScene(s,0.04).texture;pm.dispose();return m;
}
scene.environment = genEnv();

// ============================================================
// MERCURY SPHERE CLASS — extreme fluidity version
// ============================================================
class MercurySphere {
  constructor(radius, position, segments=56, speed=0.5, amp=1.0) {
    this.radius = radius; this.phase = Math.random()*Math.PI*2;
    this.speed = speed; this.amp = amp;
    const geo = new THREE.SphereGeometry(radius, segments, segments);
    this.basePos = new Float32Array(geo.attributes.position.array);
    this.geo = geo;
    const mat = new THREE.MeshPhysicalMaterial({
      color:0xc8c8d0, metalness:0.9, roughness:0.32,
      envMapIntensity:0.7, specularIntensity:0.6,
      specularColor:new THREE.Color(0xffffff),
    });
    this.mesh = new THREE.Mesh(geo, mat);
    this.mesh.position.copy(position);
    this.worldPos = position.clone();
    scene.add(this.mesh);
  }
  update(time) {
    const p = this.geo.attributes.position.array;
    const b = this.basePos;
    const t = time*this.speed + this.phase;
    const A = this.amp;
    for (let i=0;i<p.length;i+=3) {
      const bx=b[i],by=b[i+1],bz=b[i+2];
      const len=Math.sqrt(bx*bx+by*by+bz*bz);
      if(len<0.0001)continue;
      const o1=Math.sin(bx*2+t)*Math.cos(by*1.8+t*.7)*Math.sin(bz*2.2+t*.6);
      const o2=Math.sin(by*3.8-t*.5)*Math.cos(bz*3.5+t*.4)*.55;
      const o3=Math.sin(bz*5.5+t*.3)*Math.cos(bx*5-t*.35)*.3;
      const o4=Math.sin((bx+by)*7+t*.25)*Math.cos((by-bz)*6.5-t*.2)*.15;
      const o5=Math.sin(bx*.9+t*.22)*Math.cos(by*.85+t*.28)*Math.sin(bz*.95+t*.2);
      const o6=Math.sin((bx-bz)*11+t*.15)*Math.cos((by+bz)*9-t*.18)*.08;
      const n=(o1*.18+o2*.12+o3*.07+o4*.04+o5*.16+o6*.03)*A;
      const s=1+n;
      p[i]=bx*s;p[i+1]=by*s;p[i+2]=bz*s;
    }
    this.geo.attributes.position.needsUpdate=true;
    this.geo.computeVertexNormals();
  }
}

// ============================================================
// CENTRAL GIANT BLOB — extreme fluidity
// ============================================================
const centralBlob = new MercurySphere(5.8, new THREE.Vector3(0, 0, 0), 110, 0.9, 1.6);

// ============================================================
// OUTER BLOBS — 15 small deformable + 70 tiny static
// ============================================================
const deformableBlobs = [centralBlob];
const allOrbiting = []; // everything that orbits (has mesh + config)

// 60 small deformable blobs
for (let i=0;i<60;i++) {
  const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
  const dist=9+Math.random()*22;
  const x=Math.cos(theta)*Math.sin(phi)*dist;
  const y=Math.sin(theta)*Math.sin(phi)*dist*0.6;
  const z=Math.cos(phi)*dist;
  const r=0.12+Math.random()*0.35;
  const seg=Math.floor(10+r*22);
  const blob=new MercurySphere(r, new THREE.Vector3(x,y,z), seg, 0.35+Math.random()*0.5, 0.4+Math.random()*0.6);
  deformableBlobs.push(blob);
  allOrbiting.push({blob, cfg:{orbitR:dist, orbitAngle:Math.atan2(z,x), orbitSpeed:0.03+Math.random()*0.08, yDrift:Math.random()*Math.PI*2, baseY:y}});
}

// 280 tiny static reflective spheres
for (let i=0;i<280;i++) {
  const theta=Math.random()*Math.PI*2, phi=Math.acos(2*Math.random()-1);
  const dist=7+Math.random()*25;
  const x=Math.cos(theta)*Math.sin(phi)*dist;
  const y=Math.sin(theta)*Math.sin(phi)*dist*0.5;
  const z=Math.cos(phi)*dist;
  const r=0.04+Math.random()*0.12;
  const geo=new THREE.SphereGeometry(r,10,10);
  const mat=new THREE.MeshPhysicalMaterial({
    color:0xc8c8d0,metalness:0.9,roughness:0.32,
    envMapIntensity:0.7,specularIntensity:0.6,
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,y,z);
  scene.add(mesh);
  allOrbiting.push({blob:{mesh,update:()=>{}}, cfg:{orbitR:dist, orbitAngle:Math.atan2(z,x), orbitSpeed:0.02+Math.random()*0.06, yDrift:Math.random()*Math.PI*2, baseY:y}});
}

// ============================================================
// DROPLET SYSTEM — particles interacting with central blob
// ============================================================
const BLOB_RADIUS = 5.8;
const DROPLET_COUNT = 500;
const dropletGeo = new THREE.BufferGeometry();
const dropletPositions = new Float32Array(DROPLET_COUNT * 3);
const dropletSizes = new Float32Array(DROPLET_COUNT);

// Per-droplet state
const dropletState = new Float32Array(DROPLET_COUNT); // 0=orbit, 1=ejecting
const dropletVel = new Float32Array(DROPLET_COUNT * 3);
const dropletTimer = new Float32Array(DROPLET_COUNT);
const dropletData = new Float32Array(DROPLET_COUNT * 3); // orbitAngle, orbitDist, orbitSpeed

for (let i=0;i<DROPLET_COUNT;i++) {
  // Start all in orbit, random positions near blob surface
  const orbitAngle=Math.random()*Math.PI*2;
  const orbitPhi=Math.acos(2*Math.random()-1);
  const orbitDist=BLOB_RADIUS+0.15+Math.random()*1.8;
  dropletPositions[i*3]=Math.cos(orbitAngle)*Math.sin(orbitPhi)*orbitDist;
  dropletPositions[i*3+1]=Math.sin(orbitAngle)*Math.sin(orbitPhi)*orbitDist*0.8;
  dropletPositions[i*3+2]=Math.cos(orbitPhi)*orbitDist;
  dropletSizes[i]=0.6+Math.random()*1.4;
  dropletState[i]=0; // orbit
  dropletTimer[i]=0;
  dropletData[i*3]=orbitAngle;
  dropletData[i*3+1]=orbitDist;
  dropletData[i*3+2]=0.3+Math.random()*0.8; // orbit speed
}

dropletGeo.setAttribute('position',new THREE.BufferAttribute(dropletPositions,3));

const dropletMat=new THREE.PointsMaterial({
  color:0xe8e4dc, size:0.12, map:glowTex('255,250,240'),
  transparent:true, opacity:0.7,
  blending:THREE.AdditiveBlending, depthWrite:false, sizeAttenuation:true,
});
const dropletPoints=new THREE.Points(dropletGeo,dropletMat);
scene.add(dropletPoints);

function updateDroplets(time,dt) {
  const pos=dropletGeo.attributes.position.array;
  for (let i=0;i<DROPLET_COUNT;i++) {
    const state=dropletState[i];
    let ox=pos[i*3], oy=pos[i*3+1], oz=pos[i*3+2];
    const dist=Math.sqrt(ox*ox+oy*oy+oz*oz);

    if (state<0.5) {
      // ── ORBITING ──
      dropletData[i*3] += dropletData[i*3+2]*dt;
      const angle=dropletData[i*3];
      const targetDist=dropletData[i*3+1];
      const phi=Math.acos(oz/(dist||0.001));
      // Smooth drift in orbit
      const nx=Math.cos(angle)*Math.sin(phi);
      const ny=Math.sin(angle)*Math.sin(phi)*0.8;
      const nz=Math.cos(phi);
      // Lerp toward target orbit
      const lerpSpeed=2;
      const newDist=dist+(targetDist-dist)*Math.min(lerpSpeed*dt,1);
      ox=nx*newDist; oy=ny*newDist; oz=nz*newDist;

      // Random ejection
      if (Math.random()<0.003) {
        dropletState[i]=1; // eject
        const speed=2+Math.random()*7;
        dropletVel[i*3]=nx*speed+(Math.random()-.5)*2;
        dropletVel[i*3+1]=ny*speed+(Math.random()-.5)*2;
        dropletVel[i*3+2]=nz*speed+(Math.random()-.5)*2;
        dropletTimer[i]=1.5+Math.random()*4;
      }
    } else {
      // ── EJECTED ──
      ox+=dropletVel[i*3]*dt;
      oy+=dropletVel[i*3+1]*dt;
      oz+=dropletVel[i*3+2]*dt;
      const newDist=Math.sqrt(ox*ox+oy*oy+oz*oz);

      // Gravity pull toward center
      const gStr=3.5;
      if (newDist>0.001) {
        dropletVel[i*3]-=ox/newDist*gStr*dt;
        dropletVel[i*3+1]-=oy/newDist*gStr*dt;
        dropletVel[i*3+2]-=oz/newDist*gStr*dt;
      }
      // Drag
      dropletVel[i*3]*=0.985;
      dropletVel[i*3+1]*=0.985;
      dropletVel[i*3+2]*=0.985;

      dropletTimer[i]-=dt;
      // Merge back when close to surface or timer expires
      if (newDist<BLOB_RADIUS+0.2||dropletTimer[i]<=0) {
        dropletState[i]=0; // return to orbit
        const oa=Math.random()*Math.PI*2;
        const op=Math.acos(2*Math.random()-1);
        const od=BLOB_RADIUS+0.15+Math.random()*1.5;
        ox=Math.cos(oa)*Math.sin(op)*od;
        oy=Math.sin(oa)*Math.sin(op)*od*0.8;
        oz=Math.cos(op)*od;
        dropletData[i*3]=oa;
        dropletData[i*3+1]=od;
      }
    }
    pos[i*3]=ox;pos[i*3+1]=oy;pos[i*3+2]=oz;
  }
  dropletGeo.attributes.position.needsUpdate=true;
}

// ============================================================
// PAPER RIBBON — text band around the central blob
// ============================================================
const ribbonGroup = new THREE.Group();
scene.add(ribbonGroup);
const RIBBON_RADIUS = 8.8;

async function createPaperRibbon() {
  await document.fonts.load('italic 80px "Playfair Display"');

  const cw=4096, ch=320;
  const c=document.createElement('canvas');c.width=cw;c.height=ch;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,cw,ch);
  ctx.textBaseline='middle';

  // Mixed-font segments: bold brand + italic tagline
  const segments = [
    { text:'ANDREAM',  font:'italic 900 80px "Playfair Display",serif' },
    { text:'  ·  ',    font:'italic 400 80px "Playfair Display",serif' },
    { text:'The Dream That Continues', font:'italic 400 80px "Playfair Display",serif' },
    { text:'  ·  ',    font:'italic 400 80px "Playfair Display",serif' },
  ];

  // Measure one full sequence width
  let seqW=0;
  for (const seg of segments) { ctx.font=seg.font; seqW+=ctx.measureText(seg.text).width; }
  const reps=Math.ceil(cw/seqW)+1;

  function drawAll(style, blur) {
    ctx.fillStyle=style;ctx.shadowColor=style;ctx.shadowBlur=blur;
    for(let r=0;r<reps;r++){
      let x=r*seqW;
      for(const seg of segments){
        ctx.font=seg.font;
        ctx.fillText(seg.text, x, ch/2);
        x+=ctx.measureText(seg.text).width;
      }
    }
  }

  // Triple-pass glow
  drawAll('rgba(200,220,255,0.3)', 120);
  drawAll('rgba(240,245,255,0.6)', 60);
  drawAll('rgba(255,255,255,1)', 16);
  ctx.shadowBlur=0;

  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=THREE.RepeatWrapping;tex.wrapT=THREE.ClampToEdgeWrapping;
  tex.minFilter=THREE.LinearMipmapLinearFilter;tex.magFilter=THREE.LinearFilter;

  // Letters only — no additive halo, pure text ring
  const bandGeo=new THREE.CylinderGeometry(RIBBON_RADIUS, RIBBON_RADIUS, 3.0, 256, 1, true);
  const bandMat=new THREE.MeshBasicMaterial({
    map:tex, side:THREE.DoubleSide, transparent:true, depthWrite:false, opacity:1.0,
  });
  ribbonGroup.add(new THREE.Mesh(bandGeo, bandMat));

  // Barely visible guide dots at ring edges
  const dotGeo=new THREE.TorusGeometry(RIBBON_RADIUS, 0.012, 8, 200);
  const dotMat=new THREE.MeshBasicMaterial({color:0x445577,transparent:true,opacity:0.25,depthWrite:false});
  const r1=new THREE.Mesh(dotGeo,dotMat);r1.rotation.x=Math.PI/2;r1.position.y=1.55;ribbonGroup.add(r1);
  const r2=new THREE.Mesh(dotGeo.clone(),dotMat);r2.rotation.x=Math.PI/2;r2.position.y=-1.55;ribbonGroup.add(r2);
}

// Cleanup old references
const ringSprites = [];

// ============================================================
// PARTICLES — 3 layers
// ============================================================
function glowTex(inner='255,255,255') {
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,`rgba(${inner},1)`);g.addColorStop(.05,`rgba(${inner},.85)`);
  g.addColorStop(.2,`rgba(${inner},.3)`);g.addColorStop(.5,`rgba(${inner},.03)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}

function particleLayer(count,rRange,color,size,opacity,yS=0.6) {
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3),data=new Float32Array(count*4);
  for(let i=0;i<count;i++){
    const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    const r=rRange[0]+Math.random()*(rRange[1]-rRange[0]);
    pos[i*3]=Math.cos(th)*Math.sin(ph)*r;
    pos[i*3+1]=Math.sin(th)*Math.sin(ph)*r*yS;
    pos[i*3+2]=Math.cos(ph)*r;
    data[i*4]=Math.random()*Math.PI*2;data[i*4+1]=Math.random()*Math.PI*2;
    data[i*4+2]=Math.random()*Math.PI*2;data[i*4+3]=r;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({color,size,map:glowTex(),transparent:true,opacity,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
  const pts=new THREE.Points(geo,mat);scene.add(pts);
  return{pts,geo,pos,data,count};
}

const pLayers=[
  particleLayer(6000,[5,32],0xc8c4c0,0.06,0.5,0.6),
  particleLayer(3000,[2,14],0xaaccff,0.035,0.45,0.7),
  particleLayer(2000,[7,26],0xffccaa,0.045,0.3,0.5),
];

function updateParticles(time) {
  for(const L of pLayers){
    for(let i=0;i<L.count;i++){
      const px=L.data[i*4],py=L.data[i*4+1],pz=L.data[i*4+2],r=L.data[i*4+3];
      const sp=0.1+(32-r)*0.006;
      L.pos[i*3]+=Math.sin(time*sp+px)*.003;
      L.pos[i*3+1]+=Math.cos(time*sp*.7+py)*.0025;
      L.pos[i*3+2]+=Math.cos(time*sp*.6+pz)*.003;
    }
    L.geo.attributes.position.needsUpdate=true;
  }
}

// ============================================================
// LIGHTING — rainbow kaleidoscopic
// ============================================================
scene.add(new THREE.AmbientLight(0x1a1a22,0.25));

// Warm directional key
const dl1=new THREE.DirectionalLight(0xffeedd,2.5);dl1.position.set(6,14,8);scene.add(dl1);
// Cool directional fill
const dl2=new THREE.DirectionalLight(0x8899cc,1.2);dl2.position.set(-4,1,-12);scene.add(dl2);

// Rainbow point lights ringing the scene
const colorLights = [
  {col:0xff4433, pos:[8,4,6],   int:55},  // red — boosted
  {col:0xff8833, pos:[10,6,-2], int:50},  // orange — boosted
  {col:0xffcc33, pos:[6,5,-8],  int:52},  // gold — boosted
  {col:0x44ee88, pos:[-2,3,-10],int:30},  // green
  {col:0x3388cc, pos:[-8,2,-6], int:15},  // blue — very subtle
  {col:0x7755cc, pos:[-10,5,2], int:16},  // violet — muted
  {col:0xff5533, pos:[-3,7,5],  int:48},  // red — second angle
  {col:0xff55aa, pos:[-4,5,8],  int:22},  // pink — reduced
  {col:0xff7733, pos:[3,0,10],  int:44},  // warm accent (front-low) — boosted
];
const plArray = [];
colorLights.forEach(({col,pos,int})=>{
  const pl=new THREE.PointLight(col,int,20);
  pl.position.set(...pos);scene.add(pl);plArray.push(pl);
});

// ============================================================
// CAMERA ORBIT
// ============================================================
const AUTO_SPEED=0.07,SCROLL_SENS=2.2;
let orbitAngle=0,orbitVel=AUTO_SPEED,scrollD=0,lastScroll=0;
const clock=new THREE.Clock();
const camP=new THREE.Vector3(0,5,22),lkAt=new THREE.Vector3(0,0,0);

function orbitPos(angle) {
  const x=Math.cos(angle*.25)*24+Math.cos(angle*1.3+2)*9+Math.cos(angle*2.8)*4;
  const z=Math.sin(angle*.25)*24+Math.sin(angle*1.3+2)*9+Math.sin(angle*2.8)*4;
  const y=4+Math.sin(angle*.35)*7+Math.cos(angle*1.6)*4+Math.sin(angle*3)*2;
  return new THREE.Vector3(x,y,z);
}

// ============================================================
// SCROLL
// ============================================================
function onWheel(e){e.preventDefault();
  const n=e.deltaY/window.innerHeight,boost=Math.abs(e.deltaY)<40?5:1;
  scrollD+=n*boost*SCROLL_SENS;lastScroll=performance.now()*.001;
  if(Math.abs(scrollD)>.01)scrollHint.classList.add('faded');}
function onTS(e){this._ty=e.touches[0].clientY;}
function onTM(e){const dy=this._ty-e.touches[0].clientY;this._ty=e.touches[0].clientY;
  scrollD+=(dy/window.innerHeight)*SCROLL_SENS*4;lastScroll=performance.now()*.001;
  scrollHint.classList.add('faded');}
window.addEventListener('wheel',onWheel,{passive:false});
window.addEventListener('touchstart',onTS,{passive:true});
window.addEventListener('touchmove',onTM,{passive:true});

// ============================================================
// ANIMATION LOOP
// ============================================================
const noMotion=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

function animate() {
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.1);
  const time=performance.now()*.001;

  // Orbit velocity
  const sinceS=time-lastScroll;
  if(Math.abs(scrollD)>.0001){orbitVel=scrollD/dt;scrollD*=.6;if(Math.abs(scrollD)<.0005)scrollD=0;}
  const idleB=1-Math.exp(-sinceS*.5);
  orbitVel+=(AUTO_SPEED-orbitVel)*Math.min(idleB*2,1)*dt*1.5;
  orbitAngle+=orbitVel*dt;

  // Camera
  const tPos=orbitPos(orbitAngle);
  const tLook=new THREE.Vector3(Math.cos(orbitAngle*.25)*2,Math.sin(orbitAngle*.3)*1.5,Math.sin(orbitAngle*.25)*2);
  const sc=1-Math.exp(-dt*5);
  camP.lerp(tPos,sc);lkAt.lerp(tLook,sc*.5);
  camera.position.copy(camP);camera.lookAt(lkAt);

  // Mercury animation
  if(!noMotion){for(const s of deformableBlobs)s.update(time);}

  // All orbiting blobs — gentle orbital drift
  for(const item of allOrbiting){
    const s=item.blob, cfg=item.cfg;
    const a=cfg.orbitAngle+time*cfg.orbitSpeed+orbitAngle*.05;
    s.mesh.position.x=Math.cos(a)*cfg.orbitR;
    s.mesh.position.z=Math.sin(a)*cfg.orbitR;
    s.mesh.position.y=cfg.baseY+Math.sin(time*.2+cfg.yDrift)*.6;
  }

  // Paper ribbon rotation
  ribbonGroup.rotation.y += dt * 0.2;

  // Particles
  if(!noMotion){updateParticles(time);updateDroplets(time,dt);}

  // Dynamic lights — gentle pulsing
  plArray.forEach((pl,i)=>{
    pl.intensity=(colorLights[i].int*0.7)+(Math.sin(time*0.4+i*0.9)*colorLights[i].int*0.3);
  });

  // Audio update
  updateAudio(time,orbitVel);

  renderer.render(scene,camera);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
});
window.addEventListener('orientationchange',()=>setTimeout(()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);
},300));

// ============================================================
// AUDIO SYSTEM — natural soundscape (wind, water, bubbles)
// ============================================================
let audioCtx=null;
let ambientGain,windOsc,waterNoise,bubbleGain;
let mxNorm=0.5, myNorm=0.5;
let lastBubbleTime=0;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const master=audioCtx.createGain();
  master.gain.value=0.45; // moderate master volume
  master.connect(audioCtx.destination);

  // ── Wind drone: low frequency, varies with mouse Y ──
  const windGain=audioCtx.createGain();
  windGain.gain.value=0.08;
  windGain.connect(master);
  ambientGain=windGain;

  windOsc=audioCtx.createOscillator();
  windOsc.type='sine';
  windOsc.frequency.value=55;
  windOsc.connect(windGain);
  windOsc.start();

  // Second harmonic for richness
  const wind2=audioCtx.createOscillator();
  wind2.type='sine';
  wind2.frequency.value=82.5;
  const wind2Gain=audioCtx.createGain();
  wind2Gain.gain.value=0.03;
  wind2.connect(wind2Gain);
  wind2Gain.connect(master);
  wind2.start();

  // ── Water: filtered white noise, pans with mouse X ──
  const bufferSize=2*audioCtx.sampleRate;
  const noiseBuffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const data=noiseBuffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i]=Math.random()*2-1;

  waterNoise=audioCtx.createBufferSource();
  waterNoise.buffer=noiseBuffer;
  waterNoise.loop=true;

  const bandpass=audioCtx.createBiquadFilter();
  bandpass.type='bandpass';
  bandpass.frequency.value=800;
  bandpass.Q.value=0.5;

  const waterGain=audioCtx.createGain();
  waterGain.gain.value=0.04;

  const waterPanner=audioCtx.createStereoPanner();
  waterPanner.pan.value=0;

  waterNoise.connect(bandpass);
  bandpass.connect(waterGain);
  waterGain.connect(waterPanner);
  waterPanner.connect(master);
  waterNoise.start();

  // ── Bubble pops: short sine bursts triggered near center ──
  bubbleGain=audioCtx.createGain();
  bubbleGain.gain.value=0;
  bubbleGain.connect(master);

  // Store refs for animation loop
  window.__audio={master,windGain,windOsc,waterNoise,bandpass,waterGain,waterPanner,bubbleGain};
}

function playBubble(freq,vol,pan){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  osc.type='sine';
  osc.frequency.setValueAtTime(freq,now);
  osc.frequency.exponentialRampToValueAtTime(freq*0.3,now+0.15);

  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(vol,now+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,now+0.2);

  const p=audioCtx.createStereoPanner();
  p.pan.value=pan;

  osc.connect(g);g.connect(p);p.connect(audioCtx.destination);
  osc.start(now);osc.stop(now+0.2);
}

function updateAudio(time,orbitVel){
  if(!audioCtx)return;
  const a=window.__audio;
  if(!a)return;

  // Master volume subtly follows orbit speed
  const speedNorm=Math.min(1,Math.abs(orbitVel||0)/0.5);
  a.master.gain.setTargetAtTime(0.35+speedNorm*0.15,audioCtx.currentTime,0.2);

  // Wind: mouse Y controls pitch (55→110 Hz) + volume
  const windFreq=55+myNorm*55;
  a.windOsc.frequency.setTargetAtTime(windFreq,audioCtx.currentTime,0.1);
  a.windGain.gain.setTargetAtTime(0.06+myNorm*0.06,audioCtx.currentTime,0.1);

  // Water: mouse X controls pan + filter frequency
  a.waterPanner.pan.setTargetAtTime((mxNorm-0.5)*1.5,audioCtx.currentTime,0.1);
  a.bandpass.frequency.setTargetAtTime(400+mxNorm*1200,audioCtx.currentTime,0.1);
  a.waterGain.gain.setTargetAtTime(0.02+Math.abs(mxNorm-0.5)*0.06,audioCtx.currentTime,0.1);

  // Bubbles: proximity to center triggers pops
  const distToCenter=Math.sqrt((mxNorm-0.5)**2+(myNorm-0.5)**2);
  const bubbleProb=Math.max(0,0.5-distToCenter)*0.008;
  if(time-lastBubbleTime>0.08&&Math.random()<bubbleProb){
    lastBubbleTime=time;
    const freq=400+Math.random()*800;
    const vol=0.03+Math.random()*0.06;
    const pan=(mxNorm-0.5)*1.2;
    playBubble(freq,vol,pan);
  }
}

// Track mouse
document.addEventListener('mousemove',e=>{
  mxNorm=e.clientX/window.innerWidth;
  myNorm=1-e.clientY/window.innerHeight; // invert: top=high pitch
});

// Unlock audio on first user interaction
function unlockAudio(){
  if(!audioCtx){initAudio();}
  if(audioCtx.state==='suspended')audioCtx.resume();
}
document.addEventListener('click',unlockAudio,{once:true});
document.addEventListener('wheel',unlockAudio,{once:true});
document.addEventListener('touchstart',unlockAudio,{once:true});

// ============================================================
// INIT
// ============================================================
async function init() {
  await createPaperRibbon();
  await new Promise(r=>setTimeout(r,600));
  loadingEl.classList.add('hidden');
  initAudio();
  requestAnimationFrame(animate);
}
if(!renderer.capabilities.isWebGL2&&!window.WebGLRenderingContext){
  loadingEl.innerHTML='<div style="color:#E8E6E1;font-family:\'Playfair Display\',serif;text-align:center;padding:32px;"><p style="font-size:24px;">WebGL Not Available</p><p style="font-size:14px;color:#888;margin-top:16px;">Please open in a modern browser.</p></div>';
}else{init();}
</script>
